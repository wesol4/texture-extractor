<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texture Extractor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #0f1117; color: #e2e8f0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 40px 20px 80px;
    }
    h1 { font-size: 1.6rem; font-weight: 600; color: #f8fafc; margin-bottom: 8px; letter-spacing: -0.02em; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 32px; }
    .main-container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 0; }

    /* Global bar */
    .global-bar {
      background: #171c28; border: 1px solid #2d3548; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    #btn-export-all {
      background: #6366f1; color: #fff; border: none; border-radius: 8px;
      padding: 7px 18px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
      margin-left: auto; transition: background 0.15s, opacity 0.15s;
    }
    #btn-export-all:hover { background: #4f46e5; }
    #btn-export-all:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-clear-all {
      background: transparent; color: #64748b; border: 1px solid #2d3548;
      border-radius: 8px; padding: 7px 18px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    #btn-clear-all:hover { border-color: #ef4444; color: #ef4444; }
    #btn-pick-dir {
      background: #252b3b; border: 1px solid #2d3548; border-radius: 8px;
      color: #94a3b8; padding: 7px 14px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    #btn-pick-dir:hover { border-color: #6366f1; color: #e2e8f0; }
    #dir-label {
      font-size: 0.78rem; font-family: 'JetBrains Mono', monospace;
      color: #16a34a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 340px; display: none;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: #2d3548; color: #e2e8f0; border: 1px solid #6366f1;
      border-radius: 8px; padding: 10px 20px; font-size: 0.875rem;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 9999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #3d4a63; border-radius: 10px; padding: 42px 24px;
      text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
      position: relative; margin-bottom: 20px;
    }
    #drop-zone:hover, #drop-zone.dragover { border-color: #6366f1; background: #1a1f2e; }
    #drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .drop-text { color: #94a3b8; font-size: 0.95rem; }
    .drop-text span { color: #6366f1; font-weight: 500; }
    .drop-formats { color: #475569; font-size: 0.8rem; margin-top: 6px; }

    #sessions-container { display: flex; flex-direction: column; gap: 16px; }

    /* Session card */
    .session-card { background: #1e2330; border: 1px solid #2d3548; border-radius: 12px; overflow: hidden; transition: border-color 0.15s; }
    .session-card.card-dragover { border-color: #6366f1; background: #1a1f2e; }
    .card-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #171c28; border-bottom: 1px solid #2d3548; user-select: none; }
    .card-filename { font-size: 0.88rem; font-weight: 500; color: #e2e8f0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'JetBrains Mono', monospace; }
    .card-format-badge { display: inline-block; background: #1e3a5f; color: #93c5fd; font-size: 0.67rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.04em; flex-shrink: 0; }
    .card-collapse-btn { background: none; border: none; color: #64748b; cursor: pointer; padding: 4px 6px; font-size: 0.85rem; border-radius: 4px; flex-shrink: 0; transition: color 0.15s; }
    .card-collapse-btn:hover { color: #e2e8f0; }
    .card-remove-btn { background: none; border: none; color: #475569; cursor: pointer; padding: 4px 7px; font-size: 1rem; border-radius: 4px; flex-shrink: 0; transition: color 0.15s, background 0.15s; }
    .card-remove-btn:hover { color: #f87171; background: #3b181833; }
    .card-body { padding: 20px 20px 16px; }
    .card-body.collapsed { display: none; }
    .card-status { display: none; margin-bottom: 14px; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; }
    .card-status.info  { display: block; background: #1e3a5f; color: #93c5fd; border: 1px solid #2563eb44; }
    .card-status.error { display: block; background: #3b1818; color: #fca5a5; border: 1px solid #dc262644; }
    .card-status.ok    { display: block; background: #14532d; color: #86efac; border: 1px solid #16a34a44; }
    .card-progress-bar { display: none; height: 3px; background: #2d3548; border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
    .card-progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a78bfa); width: 0%; transition: width 0.3s; }
    .section-title { font-size: 0.72rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .base-name-row { background: #131720; border: 1px solid #2d3548; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .base-name-label { color: #94a3b8; font-size: 0.82rem; white-space: nowrap; flex-shrink: 0; }
    .base-name-input { flex: 1; min-width: 140px; max-width: 280px; background: #0f1117; border: 1px solid #3d4a63; border-radius: 6px; color: #f1f5f9; padding: 5px 10px; font-size: 0.88rem; font-weight: 500; font-family: 'JetBrains Mono', monospace; transition: border-color 0.15s; }
    .base-name-input:focus { outline: none; border-color: #6366f1; }
    .base-name-preview { color: #475569; font-size: 0.76rem; font-family: 'JetBrains Mono', monospace; }
    .texture-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th { text-align: left; padding: 7px 10px; color: #64748b; font-weight: 500; border-bottom: 1px solid #2d3548; font-size: 0.77rem; }
    tbody tr:hover { background: #252b3b; }
    td { padding: 7px 10px; border-bottom: 1px solid #1e2330; vertical-align: middle; }
    .badge { display: inline-block; background: #1e3a5f; color: #93c5fd; font-size: 0.67rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
    .size-cell { color: #475569; font-size: 0.8rem; }
    .orig-cell { color: #94a3b8; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .suffix-wrap { position: relative; display: flex; gap: 4px; }
    .suffix-input { background: #131720; border: 1px solid #2d3548; border-radius: 6px; color: #e2e8f0; padding: 5px 8px; font-size: 0.82rem; flex: 1; min-width: 0; font-family: 'JetBrains Mono', monospace; transition: border-color 0.15s; }
    .suffix-input:focus { outline: none; border-color: #6366f1; }
    .suffix-input.modified { border-color: #f59e0b88; }
    .suffix-drop-btn { background: #131720; border: 1px solid #2d3548; border-radius: 6px; color: #64748b; padding: 5px 7px; cursor: pointer; font-size: 0.75rem; flex-shrink: 0; transition: border-color 0.15s, color 0.15s; }
    .suffix-drop-btn:hover { border-color: #6366f1; color: #e2e8f0; }
    .suffix-menu { display: none; position: absolute; top: calc(100% + 4px); left: 0; background: #1e2330; border: 1px solid #2d3548; border-radius: 8px; z-index: 200; min-width: 160px; box-shadow: 0 8px 24px #0006; overflow: hidden; }
    .suffix-menu.open { display: block; }
    .suffix-menu-group-label { font-size: 0.68rem; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; padding: 6px 14px 2px; font-weight: 600; }
    .suffix-menu button { display: block; width: 100%; text-align: left; background: none; border: none; border-radius: 0; color: #94a3b8; padding: 6px 14px; font-size: 0.82rem; font-family: 'JetBrains Mono', monospace; cursor: pointer; }
    .suffix-menu button:hover { background: #252b3b; color: #e2e8f0; }
    .suffix-menu .menu-sep { height: 1px; background: #2d3548; margin: 4px 0; }
    .result-cell { color: #64748b; font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
    .result-cell .result-base { color: #818cf8; }
    .result-cell .result-suffix { color: #94a3b8; }
    .result-cell .result-ext { color: #475569; }
    .thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; border: 1px solid #2d3548; cursor: zoom-in; display: block; background: #131720; }
    .thumb:hover { border-color: #6366f1; }
    .no-texture-msg { color: #475569; font-size: 0.85rem; padding: 14px 0 4px; font-style: italic; }
    .card-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; align-items: center; }
    .card-actions-hint { flex: 1; color: #475569; font-size: 0.77rem; font-family: 'JetBrains Mono', monospace; }
    .btn-export-card { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.15s, opacity 0.15s, transform 0.1s; min-width: 130px; }
    .btn-export-card:hover { background: #4f46e5; }
    .btn-export-card:active { transform: scale(0.97); }
    .btn-export-card:disabled { opacity: 0.4; cursor: not-allowed; }
    .card-export-result { display: none; margin-top: 10px; padding: 9px 14px; border-radius: 7px; font-size: 0.82rem; font-family: 'JetBrains Mono', monospace; }
    .card-export-result.ok  { display: block; background: #14532d; color: #86efac; border: 1px solid #16a34a44; }
    .card-export-result.err { display: block; background: #3b1818; color: #fca5a5; border: 1px solid #dc262644; }
    #lightbox { display: none; position: fixed; inset: 0; z-index: 999; background: #000000cc; align-items: center; justify-content: center; cursor: zoom-out; }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; border: 1px solid #2d3548; box-shadow: 0 0 60px #0008; }
    #lightbox-label { position: absolute; bottom: 24px; color: #94a3b8; font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; }
    .zip-choice-label { font-size: 0.88rem; color: #94a3b8; margin-bottom: 10px; }
    .zip-choice-btn { display: block; width: 100%; margin: 5px 0; background: #252b3b; border: 1px solid #2d3548; border-radius: 7px; color: #e2e8f0; padding: 9px 14px; text-align: left; cursor: pointer; font-size: 0.85rem; transition: border-color 0.15s, background 0.15s; }
    .zip-choice-btn:hover { border-color: #6366f1; background: #1a1f2e; }
    button { transition: opacity 0.15s, transform 0.1s; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .prefix-select { background: #131720; border: 1px solid #2d3548; border-radius: 6px; color: #e2e8f0; padding: 5px 8px; font-size: 0.82rem; font-family: 'JetBrains Mono', monospace; cursor: pointer; }
    .prefix-select:focus { outline: none; border-color: #6366f1; }
    .strip-tex-wrap { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: #94a3b8; cursor: pointer; white-space: nowrap; }
    .strip-tex-cb { accent-color: #6366f1; cursor: pointer; }
    .model-name-preview { color: #475569; font-size: 0.76rem; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  </style>
</head>
<body>

<h1>Texture Extractor</h1>
<p class="subtitle">FBX · GLB · USDZ — wyciągaj i rename'uj textury &nbsp;·&nbsp; wszystko lokalnie w przeglądarce</p>

<div id="lightbox">
  <img id="lightbox-img" src="" alt="" />
  <span id="lightbox-label"></span>
</div>

<div class="main-container">
  <div class="global-bar">
    <button id="btn-pick-dir" type="button">&#128194; Folder docelowy</button>
    <span id="dir-label"></span>
    <button id="btn-export-all" type="button">Zapisz wszystko</button>
    <button id="btn-clear-all" type="button">Wyczyść</button>
  </div>

  <div id="drop-zone">
    <input type="file" id="file-input" accept=".fbx,.glb,.usdz,.zip" multiple />
    <div class="drop-icon">&#128230;</div>
    <div class="drop-text">Przeciągnij pliki lub <span>kliknij</span></div>
    <div class="drop-formats">FBX · GLB · USDZ · ZIP</div>
  </div>

  <div id="sessions-container"></div>
</div>

<script>
'use strict';

// ── PBR groups ─────────────────────────────────────────────────────────────
const PBR_GROUPS = [
  { label: 'Kolor',   items: ['_diffuse', '_albedo', '_basecolor', '_color'] },
  { label: 'Surface', items: ['_normal', '_roughness', '_metallic', '_specular', '_glossiness'] },
  { label: 'Extra',   items: ['_ao', '_emissive', '_height', '_opacity', '_mask', '_bump', '_displacement'] },
];
const PBR_KEYWORDS = [
  'basecolor','base_color','albedo','diffuse','color',
  'normal','nrm','nml',
  'roughness','rough',
  'metallic','metalness','metal',
  'specular','spec',
  'ambient_occlusion','ao','occlusion',
  'emissive','emission',
  'height','displacement','bump',
  'opacity','alpha','mask',
  'subsurface','sss','transmission',
];
const IMAGE_EXTS = new Set(['.png','.jpg','.jpeg','.tif','.tiff','.bmp','.dds','.exr','.tga']);
const MODEL_EXTS = new Set(['.fbx','.glb','.usdz']);

// ── Target directory (File System Access API) ──────────────────────────────
let targetDirHandle = null;
const btnPickDir = document.getElementById('btn-pick-dir');
const dirLabel   = document.getElementById('dir-label');
const fsaSupported = 'showDirectoryPicker' in window;

if (!fsaSupported) {
  btnPickDir.title = 'Twoja przeglądarka nie obsługuje wyboru folderu — pliki będą pobierane jako ZIP';
  btnPickDir.style.opacity = '0.45';
  btnPickDir.style.cursor = 'not-allowed';
}

btnPickDir.addEventListener('click', async () => {
  if (!fsaSupported) { showToast('Użyj Chrome lub Edge aby zapisywać bezpośrednio do folderu'); return; }
  try {
    targetDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    dirLabel.textContent = '→ ' + targetDirHandle.name + '/';
    dirLabel.style.display = 'inline';
    document.querySelectorAll('.btn-export-card').forEach(b => b.textContent = 'Zapisz plik');
  } catch(e) {
    if (e.name !== 'AbortError') showToast('Błąd wyboru folderu: ' + e.message);
  }
});

async function writeFilesToDir(dirHandle, baseName, files) {
  // Create subfolder baseName/
  const subDir = await dirHandle.getDirectoryHandle(baseName, { create: true });
  for (const { name, data } of files) {
    const fh = await subDir.getFileHandle(name, { create: true });
    const w  = await fh.createWritable();
    await w.write(data instanceof Uint8Array ? data : new Uint8Array(data));
    await w.close();
  }
  return subDir;
}

// ── Sessions ───────────────────────────────────────────────────────────────
// Map<cardId, { cardEl, entries, filename, origFilename, srcBuffer, srcExt, blobUrls }>
const sessions = new Map();

// ── Helpers ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.classList.add('show'); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 3000);
}

// ── Image utils ────────────────────────────────────────────────────────────
function detectExt(data) {
  if (data[0]===0x89&&data[1]===0x50&&data[2]===0x4E&&data[3]===0x47) return '.png';
  if (data[0]===0xFF&&data[1]===0xD8&&data[2]===0xFF) return '.jpg';
  if (data[0]===0x44&&data[1]===0x44&&data[2]===0x53&&data[3]===0x20) return '.dds';
  if (data[0]===0x42&&data[1]===0x4D) return '.bmp';
  if ((data[0]===0x4D&&data[1]===0x4D)||(data[0]===0x49&&data[1]===0x49)) return '.tif';
  return '.bin';
}
function normalizeName(name, ext) {
  name = name.replace(/\0/g,'').trim();
  const origExt = (name.match(/\.[^.]+$/) || [''])[0].toLowerCase() || ext;
  let stem = name.replace(/\.[^.]+$/,'').toLowerCase();
  stem = stem.replace(/[^\w]/g,'_').replace(/_+/g,'_').replace(/^_+|_+$/g,'') || 'texture';
  return stem + origExt;
}
function extractPBRSuffix(stem) {
  const lower = stem.toLowerCase();
  for (const kw of PBR_KEYWORDS) {
    if (lower.endsWith('_'+kw)||lower.endsWith('-'+kw)) return '_'+kw;
    if (lower === kw) return '';
  }
  return null;
}
function detectSuffixes(entries) {
  if (!entries.length) return [];
  const stems = entries.map(e => e.suggested.replace(/\.[^.]+$/,''));
  const pbr = stems.map(extractPBRSuffix);
  if (pbr.some(p => p !== null)) {
    let idx = 0;
    return pbr.map(p => p !== null ? p : `_${idx++}`);
  }
  let common = stems[0];
  for (const s of stems.slice(1)) {
    let i = 0; while (i<common.length&&i<s.length&&common[i]===s[i]) i++;
    common = common.slice(0,i);
  }
  const remaining = stems.map(s => s.slice(common.length));
  if (!remaining.every(r => r===''||r.startsWith('_'))) {
    const li = common.lastIndexOf('_');
    common = li >= 0 ? common.slice(0, li+1) : '';
  }
  const suffixes = stems.map(s => s.slice(common.length));
  return suffixes.map(s => s&&!s.startsWith('_') ? '_'+s : s);
}

// ── FBX parser ─────────────────────────────────────────────────────────────
function readPtr(dv, offset, ptrSize) {
  const val = dv.getUint32(offset, true);
  return { val, next: offset + ptrSize };
}
function parseFBXNode(dv, data, offset, end, ptrSize) {
  if (offset + ptrSize*3 + 2 >= end) return null;
  let r = readPtr(dv, offset, ptrSize); const endOff = r.val; offset = r.next;
  r = readPtr(dv, offset, ptrSize); const numProps = r.val; offset = r.next;
  r = readPtr(dv, offset, ptrSize); offset = r.next;
  if (endOff === 0) return null;
  const nameLen = data[offset]; offset++;
  const name = new TextDecoder('utf-8',{fatal:false}).decode(data.slice(offset, offset+nameLen));
  offset += nameLen;
  const props = [];
  for (let i = 0; i < numProps && offset < endOff; i++) {
    const tc = String.fromCharCode(data[offset]); offset++;
    if (tc==='Y') { props.push({t:tc,v:dv.getInt16(offset,true)}); offset+=2; }
    else if (tc==='C') { props.push({t:tc,v:data[offset]!==0}); offset++; }
    else if (tc==='I') { props.push({t:tc,v:dv.getInt32(offset,true)}); offset+=4; }
    else if (tc==='F') { props.push({t:tc,v:dv.getFloat32(offset,true)}); offset+=4; }
    else if (tc==='D') { props.push({t:tc,v:dv.getFloat64(offset,true)}); offset+=8; }
    else if (tc==='L') { props.push({t:tc,v:dv.getUint32(offset,true)}); offset+=8; }
    else if (tc==='S'||tc==='R') {
      const len = dv.getUint32(offset,true); offset+=4;
      const dataStart = offset;
      const raw = data.slice(offset,offset+len);
      props.push({t:tc,v:tc==='S'?new TextDecoder('utf-8',{fatal:false}).decode(raw):raw,dataOff:dataStart,dataLen:len});
      offset+=len;
    } else if (tc==='B') {
      const len = dv.getUint32(offset,true); offset+=4;
      props.push({t:tc,v:data.slice(offset,offset+len)}); offset+=len;
    } else {
      offset+=4; offset+=4;
      const compLen = dv.getUint32(offset,true); offset+=4;
      props.push({t:tc,v:null}); offset+=compLen;
    }
  }
  const children = [];
  const sentinel = ptrSize*3+2;
  while (offset < endOff-sentinel) {
    const child = parseFBXNode(dv, data, offset, endOff, ptrSize);
    if (!child) break;
    children.push(child.node); offset = child.endOffset;
  }
  return { node:{name,props,children}, endOffset:endOff };
}
function findFBXNodes(nodes, target) {
  const res = [];
  for (const n of nodes) {
    if (n.name===target) res.push(n);
    res.push(...findFBXNodes(n.children, target));
  }
  return res;
}
function parseFBX(buffer) {
  const data = new Uint8Array(buffer);
  const dv = new DataView(buffer);
  const magic = new TextDecoder().decode(data.slice(0,20));
  if (!magic.startsWith('Kaydara FBX Binary  ')) return null;
  const version = dv.getUint32(23, true);
  const ptrSize = version >= 7500 ? 8 : 4;
  let offset = 27;
  const end = data.length - 160;
  const nodes = [];
  while (offset < end) {
    const res = parseFBXNode(dv, data, offset, end, ptrSize);
    if (!res) break;
    nodes.push(res.node); offset = res.endOffset;
  }
  const entries = [];
  for (const video of findFBXNodes(nodes,'Video')) {
    let texName = null;
    for (const p of video.props) {
      if (p.t==='S'&&p.v) { texName = p.v.split('\0')[0].trim(); break; }
    }
    for (const child of video.children) {
      if (child.name==='RelativeFilename'||child.name==='Filename') {
        for (const p of child.props) {
          if (p.t==='S'&&p.v) {
            const fn = p.v.replace(/\\/g,'/').split('/').pop().replace(/\0/g,'').trim();
            if (fn) { texName=fn; break; }
          }
        }
      }
    }
    let raw = null, contentOff = -1, contentLen = 0;
    for (const child of video.children) {
      if (child.name==='Content') {
        for (const p of child.props) {
          if ((p.t==='R'||p.t==='B')&&p.v&&p.v.length>4) {
            raw=p.v;
            contentOff = p.dataOff !== undefined ? p.dataOff : -1;
            contentLen = p.dataLen || 0;
            break;
          }
        }
      }
    }
    if (!texName||!raw||raw.length<=4) continue;
    if (raw[0]!==0x89&&!(raw[0]===0xFF&&raw[1]===0xD8)&&
        !(raw[0]===0x44&&raw[1]===0x44)&&raw[0]!==0x42) {
      raw = raw.slice(4);
    }
    const ext = detectExt(raw);
    entries.push({ origName:texName, suggested:normalizeName(texName,ext), data:raw, contentOff, contentLen });
  }
  return entries;
}

// ── GLB parser ─────────────────────────────────────────────────────────────
function parseGLB(buffer) {
  const dv = new DataView(buffer);
  if (dv.getUint32(0,true)!==0x46546C67) return null;
  let offset = 12;
  let jsonBytes = null, binBytes = null;
  while (offset < buffer.byteLength-8) {
    const len = dv.getUint32(offset,true);
    const type = dv.getUint32(offset+4,true);
    if (type===0x4E4F534A) jsonBytes = new Uint8Array(buffer,offset+8,len);
    if (type===0x004E4942) binBytes = new Uint8Array(buffer,offset+8,len);
    offset += 8 + ((len+3)&~3);
  }
  if (!jsonBytes) return null;
  let gltf;
  try { gltf = JSON.parse(new TextDecoder().decode(jsonBytes)); } catch { return null; }
  const images = gltf.images||[];
  const bufferViews = gltf.bufferViews||[];
  const entries = [];
  for (let i = 0; i < images.length; i++) {
    const img = images[i];
    const name = img.name||img.uri||`texture_${i}`;
    let data = null;
    if (img.bufferView!==undefined&&binBytes) {
      const bv = bufferViews[img.bufferView];
      data = binBytes.slice(bv.byteOffset||0,(bv.byteOffset||0)+bv.byteLength);
    }
    if (data&&data.length>0) {
      const ext = detectExt(data);
      entries.push({ origName:name, suggested:normalizeName(name,ext), data });
    }
  }
  return entries;
}

// ── USDZ parser ────────────────────────────────────────────────────────────
async function parseUSDZ(buffer) {
  const zip = await JSZip.loadAsync(buffer);
  const entries = [];
  for (const [path, file] of Object.entries(zip.files)) {
    if (file.dir) continue;
    const ext = (path.match(/\.[^.]+$/)||[''])[0].toLowerCase();
    if (!IMAGE_EXTS.has(ext)) continue;
    const ab = await file.async('arraybuffer');
    const data = new Uint8Array(ab);
    const detectedExt = detectExt(data);
    const basename = path.split('/').pop();
    entries.push({ origName:basename, suggested:normalizeName(basename,detectedExt), data });
  }
  return entries;
}

// ── ZIP handler ────────────────────────────────────────────────────────────
async function findModelsInZIP(buffer) {
  const zip = await JSZip.loadAsync(buffer);
  const found = [];
  for (const [path, file] of Object.entries(zip.files)) {
    if (file.dir) continue;
    const ext = (path.match(/\.[^.]+$/)||[''])[0].toLowerCase();
    if (!MODEL_EXTS.has(ext)) continue;
    const ab = await file.async('arraybuffer');
    // Look for companion .fbm folder (same stem, .fbm extension)
    const stem = path.replace(/\.[^.]+$/, '');
    const fbmPrefix = stem + '.fbm/';
    const fbmImages = [];
    for (const [imgPath, imgFile] of Object.entries(zip.files)) {
      if (imgFile.dir) continue;
      if (!imgPath.toLowerCase().startsWith(fbmPrefix.toLowerCase())) continue;
      const imgExt = (imgPath.match(/\.[^.]+$/)||[''])[0].toLowerCase();
      if (!IMAGE_EXTS.has(imgExt)) continue;
      const imgAb = await imgFile.async('arraybuffer');
      const imgData = new Uint8Array(imgAb);
      const det = detectExt(imgData);
      const basename = imgPath.split('/').pop();
      fbmImages.push({ origName: basename, suggested: normalizeName(basename, det), data: imgData });
    }
    found.push({ name: path.split('/').pop(), ext, buffer: ab, fbmImages });
  }
  return found.sort((a,b) => a.name.localeCompare(b.name));
}

// ── Process a file buffer → entries ───────────────────────────────────────
async function processBuffer(buffer, ext) {
  if (ext==='.fbx') return parseFBX(buffer);
  if (ext==='.glb') return parseGLB(buffer);
  if (ext==='.usdz') return await parseUSDZ(buffer);
  return null;
}

// ── Strip embedded textures from FBX ───────────────────────────────────────
function stripFBXContent(buffer, entries) {
  const data = new Uint8Array(buffer.slice(0));
  for (const e of entries) {
    if (e.contentOff >= 0 && e.contentLen > 0) {
      data.fill(0, e.contentOff, e.contentOff + e.contentLen);
    }
  }
  return data.buffer;
}

// ── FBX binary patch ───────────────────────────────────────────────────────
function indexOfBytes(hay, needle, start=0) {
  outer: for (let i=start; i<=hay.length-needle.length; i++) {
    for (let j=0; j<needle.length; j++) if (hay[i+j]!==needle[j]) continue outer;
    return i;
  }
  return -1;
}
function patchFBX(buffer, renameMap, baseName) {
  const data = new Uint8Array(buffer.slice(0));
  const enc = new TextEncoder();
  for (const [orig, newName] of Object.entries(renameMap)) {
    const ob = enc.encode(orig), nb = enc.encode(newName);
    if (nb.length > ob.length) continue;
    let start = 0;
    while (true) {
      const idx = indexOfBytes(data, ob, start);
      if (idx===-1) break;
      data.set(nb, idx);
      for (let i=nb.length; i<ob.length; i++) data[idx+i]=0;
      start = idx+ob.length;
    }
  }
  return { name: baseName+'.fbx', data };
}

// ── GLB patch → new GLB with external texture URIs ─────────────────────────
function patchGLB(buffer, renameMap, baseName) {
  const dv = new DataView(buffer);
  let offset = 12;
  let jsonBytes=null, binBytes=null, binLen=0;
  while (offset < buffer.byteLength-8) {
    const len = dv.getUint32(offset,true);
    const type = dv.getUint32(offset+4,true);
    if (type===0x4E4F534A) jsonBytes = new Uint8Array(buffer,offset+8,len);
    if (type===0x004E4942) { binBytes=new Uint8Array(buffer,offset+8,len); binLen=len; }
    offset += 8+((len+3)&~3);
  }
  if (!jsonBytes) return null;
  let gltf;
  try { gltf = JSON.parse(new TextDecoder().decode(jsonBytes)); } catch { return null; }
  const images = gltf.images||[];
  for (let i=0; i<images.length; i++) {
    const img=images[i];
    const name=img.name||img.uri||`texture_${i}`;
    if (renameMap[name]) { img.uri=renameMap[name]; delete img.bufferView; delete img.mimeType; }
  }
  const newJson = new TextEncoder().encode(JSON.stringify(gltf));
  const jp = ((newJson.length+3)&~3);
  const bp = binBytes ? ((binLen+3)&~3) : 0;
  const total = 12+8+jp+(binBytes ? 8+bp : 0);
  const out = new Uint8Array(total);
  const odv = new DataView(out.buffer);
  odv.setUint32(0,0x46546C67,true); odv.setUint32(4,2,true); odv.setUint32(8,total,true);
  odv.setUint32(12,jp,true); odv.setUint32(16,0x4E4F534A,true);
  out.set(newJson,20);
  for (let i=newJson.length; i<jp; i++) out[20+i]=0x20;
  if (binBytes) {
    const bc=20+jp;
    odv.setUint32(bc,bp,true); odv.setUint32(bc+4,0x004E4942,true);
    out.set(binBytes,bc+8);
  }
  return { name: baseName+'.glb', data: out };
}

// ── Export card as ZIP download ────────────────────────────────────────────
async function exportCard(cardId) {
  const s = sessions.get(cardId);
  if (!s) return;
  const body = s.cardEl.querySelector('.card-body');
  const btnExport = body.querySelector('.btn-export-card');
  const exportRes = body.querySelector('.card-export-result');
  btnExport.disabled = true;
  btnExport.textContent = 'Zapisywanie…';
  try {
    const baseName = body.querySelector('.base-name-input')?.value?.trim() ||
                     s.filename.replace(/\.[^.]+$/,'');
    const meshPrefix = body.querySelector('.mesh-prefix-select')?.value ?? '';
    const texPrefix = body.querySelector('.tex-prefix-select')?.value ?? '';
    const stripTex = body.querySelector('.strip-tex-cb')?.checked ?? false;
    const renameMap = {};
    const filesToSave = [];
    const tbody = body.querySelector('.texture-rows');
    if (tbody) {
      for (const tr of tbody.querySelectorAll('tr')) {
        const id = parseInt(tr.dataset.id||tr.querySelector('[data-id]')?.dataset.id);
        const entry = s.entries[id];
        if (!entry) continue;
        const suffix = tr.querySelector('.suffix-input')?.value ?? '';
        const ext = detectExt(entry.data);
        const newName = texPrefix + (baseName ? (baseName+suffix+ext) : entry.suggested);
        filesToSave.push({ name: newName, data: entry.data });
        renameMap[entry.origName] = newName;
      }
    }
    // Patch model
    if (s.srcBuffer && s.srcExt) {
      const modelBase = meshPrefix + baseName;
      let srcBuf = s.srcBuffer;
      if (stripTex && s.srcExt==='.fbx') srcBuf = stripFBXContent(srcBuf, s.entries);
      let model = null;
      if (s.srcExt==='.fbx') model = patchFBX(srcBuf, renameMap, modelBase);
      else if (s.srcExt==='.glb') model = patchGLB(srcBuf, renameMap, meshPrefix + baseName);
      filesToSave.push(model || { name: modelBase+s.srcExt, data: new Uint8Array(srcBuf) });
    }

    if (targetDirHandle) {
      // Save directly to chosen folder → subfolder baseName/
      await writeFilesToDir(targetDirHandle, baseName, filesToSave);
      exportRes.className = 'card-export-result ok';
      exportRes.textContent = `Zapisano → ${targetDirHandle.name}/${baseName}/  (${filesToSave.length} plików)`;
    } else {
      // Fallback: ZIP download
      const zip = new JSZip();
      filesToSave.forEach(f => zip.file(f.name, f.data));
      const blob = await zip.generateAsync({ type:'blob', compression:'DEFLATE' });
      downloadBlob(blob, baseName+'_textures.zip');
      exportRes.className = 'card-export-result ok';
      exportRes.textContent = `Pobrano: ${baseName}_textures.zip`;
    }
  } catch(err) {
    exportRes.className = 'card-export-result err';
    exportRes.textContent = 'Błąd: '+err.message;
  } finally {
    btnExport.disabled = false;
    btnExport.textContent = 'Zapisz plik';
  }
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// ── Card UI ────────────────────────────────────────────────────────────────
function createCard(filename) {
  const cardId = 'card-'+uuid();
  const ext = (filename.match(/\.([^.]+)$/)||['',''])[1].toUpperCase();
  const card = document.createElement('div');
  card.className = 'session-card'; card.id = cardId;
  card.innerHTML = `
    <div class="card-header">
      <span class="card-filename">${escHtml(filename)}</span>
      ${ext?`<span class="card-format-badge">${escHtml(ext)}</span>`:''}
      <button class="card-collapse-btn">&#9660;</button>
      <button class="card-remove-btn">&#10005;</button>
    </div>
    <div class="card-body">
      <div class="card-progress-bar"><div class="card-progress-fill"></div></div>
      <div class="card-status info">Wczytywanie…</div>
    </div>`;
  sessionsContainer.appendChild(card);
  sessions.set(cardId, { cardEl:card, entries:[], filename, origFilename:filename, srcBuffer:null, srcExt:null, blobUrls:[] });
  card.querySelector('.card-collapse-btn').addEventListener('click', () => {
    const body = card.querySelector('.card-body');
    const btn  = card.querySelector('.card-collapse-btn');
    btn.innerHTML = body.classList.toggle('collapsed') ? '&#9650;' : '&#9660;';
  });
  card.querySelector('.card-remove-btn').addEventListener('click', () => {
    const s = sessions.get(cardId);
    if (s) s.blobUrls.forEach(u => URL.revokeObjectURL(u));
    card.remove(); sessions.delete(cardId);
  });
  card.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); card.classList.add('card-dragover'); });
  card.addEventListener('dragleave', e => { if (!card.contains(e.relatedTarget)) card.classList.remove('card-dragover'); });
  card.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation(); card.classList.remove('card-dragover');
    if (e.dataTransfer.files.length) processFileToCard(cardId, e.dataTransfer.files[0]);
  });
  return cardId;
}

function setCardProgress(cardId, pct) {
  const s = sessions.get(cardId); if (!s) return;
  const bar = s.cardEl.querySelector('.card-progress-bar');
  const fill = s.cardEl.querySelector('.card-progress-fill');
  if (!bar||!fill) return;
  bar.style.display = 'block';
  fill.style.width = pct+'%';
  if (pct>=100) setTimeout(()=>{ bar.style.display='none'; },400);
}
function showCardStatus(cardId, msg, type) {
  const s = sessions.get(cardId); if (!s) return;
  const el = s.cardEl.querySelector('.card-status'); if (!el) return;
  el.textContent = msg; el.className = 'card-status '+type;
}

function renderCardBody(cardId, entries, modelStem) {
  const s = sessions.get(cardId); if (!s) return;
  s.entries = entries;
  // Revoke old blob urls
  s.blobUrls.forEach(u => URL.revokeObjectURL(u)); s.blobUrls = [];
  // Build blob urls for previews
  const previewUrls = entries.map(e => {
    const mime = {'.png':'image/png','.jpg':'image/jpeg','.bmp':'image/bmp','.tif':'image/tiff','.dds':'image/vnd.ms-dds'}[detectExt(e.data)]||'application/octet-stream';
    const url = URL.createObjectURL(new Blob([e.data],{type:mime}));
    s.blobUrls.push(url); return url;
  });
  const suffixes = detectSuffixes(entries);
  const hasTextures = entries.length > 0;
  const body = s.cardEl.querySelector('.card-body');
  body.innerHTML = `
    <div class="card-status"></div>
    <div class="section-title">Nazwa bazowa</div>
    <div class="base-name-row">
      <span class="base-name-label">Baza</span>
      <input class="base-name-input" type="text" spellcheck="false" value="${escHtml(modelStem)}" />
      <span class="base-name-label" style="margin-left:4px">Mesh</span>
      <select class="mesh-prefix-select prefix-select">
        <option value="">—</option>
        <option value="SM_">SM_</option>
        <option value="SK_">SK_</option>
        <option value="BP_">BP_</option>
      </select>
      <span class="base-name-label">Tex</span>
      <select class="tex-prefix-select prefix-select">
        <option value="">—</option>
        <option value="T_">T_</option>
      </select>
      ${s.srcExt==='.fbx' ? '<label class="strip-tex-wrap"><input type="checkbox" class="strip-tex-cb" checked> Strip FBX</label>' : ''}
      <span class="model-name-preview"></span>
      <span class="base-name-preview"></span>
    </div>
    ${hasTextures ? `
    <div class="section-title">Textury</div>
    <div class="texture-table-wrap"><table>
      <thead><tr><th></th><th>#</th><th>Oryginalna nazwa</th><th>Format</th><th>Rozmiar</th><th>Sufiks</th><th>Wynik</th></tr></thead>
      <tbody class="texture-rows"></tbody>
    </table></div>
    ` : `<div class="no-texture-msg">Brak textur — plik zostanie spakowany z nową nazwą bazową.</div>`}
    <div class="card-actions">
      <span class="card-actions-hint">${hasTextures?entries.length+' textur':'brak textur'}</span>
      <button class="btn-export-card" type="button">Zapisz plik</button>
    </div>
    <div class="card-export-result"></div>`;
  const tbody = body.querySelector('.texture-rows');
  if (hasTextures && tbody) {
    entries.forEach((e,i) => {
      const ext = detectExt(e.data);
      const formatBadge = ext.slice(1).toUpperCase();
      const sizeKb = Math.round(e.data.length/1024);
      const origSuffix = suffixes[i]||'';
      const tr = document.createElement('tr');
      tr.dataset.id = String(i);
      tr.dataset.format = formatBadge;
      tr.innerHTML = `
        <td style="width:44px"><img class="thumb" src="${escHtml(previewUrls[i])}" alt="${escHtml(e.origName)}" data-name="${escHtml(e.origName)}" /></td>
        <td style="color:#475569">${i+1}</td>
        <td><span class="orig-cell" title="${escHtml(e.origName)}">${escHtml(e.origName)}</span></td>
        <td><span class="badge">${escHtml(formatBadge)}</span></td>
        <td><span class="size-cell">${sizeKb} KB</span></td>
        <td><div class="suffix-wrap">
          <input class="suffix-input" data-id="${i}" data-orig="${escHtml(origSuffix)}" value="${escHtml(origSuffix)}" />
          <button class="suffix-drop-btn" type="button" tabindex="-1">&#9660;</button>
          <div class="suffix-menu"></div>
        </div></td>
        <td class="result-cell"></td>`;
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll('.suffix-input').forEach(inp => {
      inp.addEventListener('input', () => {
        inp.classList.toggle('modified', inp.value!==inp.dataset.orig);
        updateResultCells(cardId);
      });
    });
  }
  body.querySelector('.base-name-input').addEventListener('input', () => updateResultCells(cardId));
  body.querySelectorAll('.mesh-prefix-select, .tex-prefix-select').forEach(sel => {
    sel.addEventListener('change', () => updateResultCells(cardId));
  });
  updateResultCells(cardId);
  body.querySelector('.btn-export-card').addEventListener('click', () => exportCard(cardId));
  showCardStatus(cardId, hasTextures?`Znaleziono ${entries.length} textur.`:'Brak embedded textur.', hasTextures?'ok':'info');
}

function updateResultCells(cardId) {
  const s = sessions.get(cardId); if (!s) return;
  const body = s.cardEl.querySelector('.card-body');
  const baseInput = body.querySelector('.base-name-input'); if (!baseInput) return;
  const base = baseInput.value.trim();
  const meshPrefix = body.querySelector('.mesh-prefix-select')?.value ?? '';
  const texPrefix = body.querySelector('.tex-prefix-select')?.value ?? '';
  const tbody = body.querySelector('.texture-rows');
  if (tbody) {
    for (const tr of tbody.querySelectorAll('tr')) {
      const suffixInp = tr.querySelector('.suffix-input');
      const resultCell = tr.querySelector('.result-cell');
      if (!suffixInp||!resultCell) continue;
      const fmt = tr.dataset.format;
      const ext = '.'+fmt.toLowerCase();
      const suffix = suffixInp.value;
      resultCell.innerHTML = base
        ? `<span class="result-base">${escHtml(texPrefix+base)}</span><span class="result-suffix">${escHtml(suffix)}</span><span class="result-ext">${escHtml(ext)}</span>`
        : `<span style="color:#3d4a63">—</span>`;
    }
  }
  const modelPreview = body.querySelector('.model-name-preview');
  if (modelPreview) {
    modelPreview.textContent = base ? ('→ ' + meshPrefix + base + (s.srcExt||'')) : '';
  }
  const preview = body.querySelector('.base-name-preview');
  if (preview&&s.entries.length) {
    const parts = s.entries.slice(0,3).map((e,i) => {
      const inp = tbody?.querySelector(`[data-id="${i}"]`);
      const suffix = inp?inp.value:(detectSuffixes(s.entries)[i]||'');
      return texPrefix+base+(base?suffix:'')+'.'+(detectExt(e.data).slice(1));
    });
    preview.textContent = parts.join(', ')+(s.entries.length>3?'…':'');
  } else if (preview) { preview.textContent=''; }
}

// ── Process file → card ────────────────────────────────────────────────────
async function processFileToCard(cardId, file) {
  const s = sessions.get(cardId); if (!s) return;
  s.entries=[]; s.blobUrls.forEach(u=>URL.revokeObjectURL(u)); s.blobUrls=[];
  s.filename = file.name;
  const extRaw = (file.name.match(/\.[^.]+$/)||[''])[0].toLowerCase();
  // Update header
  s.cardEl.querySelector('.card-filename').textContent = file.name;
  const badge = s.cardEl.querySelector('.card-format-badge');
  if (badge) badge.textContent = extRaw.slice(1).toUpperCase();
  // Reset body to loading state
  const body = s.cardEl.querySelector('.card-body');
  body.classList.remove('collapsed');
  s.cardEl.querySelector('.card-collapse-btn').innerHTML = '&#9660;';
  body.innerHTML = `<div class="card-progress-bar"><div class="card-progress-fill"></div></div><div class="card-status info">Wczytywanie…</div>`;
  setCardProgress(cardId, 20);
  try {
    const buffer = await file.arrayBuffer();
    setCardProgress(cardId, 60);
    if (extRaw==='.zip') {
      const models = await findModelsInZIP(buffer);
      setCardProgress(cardId, 80);
      if (!models.length) throw new Error('ZIP nie zawiera pliku FBX / GLB / USDZ');
      if (models.length===1) {
        await loadModelToCard(cardId, models[0].buffer, models[0].ext, models[0].name, models[0].fbmImages);
      } else {
        renderZipChoice(cardId, models);
      }
    } else {
      await loadModelToCard(cardId, buffer, extRaw, file.name);
    }
  } catch(err) {
    setCardProgress(cardId, 100);
    body.innerHTML = `<div class="card-status error">Błąd: ${escHtml(err.message)}</div>`;
  }
}

async function loadModelToCard(cardId, buffer, ext, filename, fbmImages=[]) {
  const s = sessions.get(cardId); if (!s) return;
  s.srcBuffer = buffer;
  s.srcExt = ext;
  setCardProgress(cardId, 80);
  let entries = await processBuffer(buffer, ext);
  if (!entries) entries = [];
  // Fallback: use companion .fbm images if no embedded textures found
  if (entries.length === 0 && fbmImages.length > 0) entries = fbmImages;
  setCardProgress(cardId, 100);
  const stem = filename.replace(/\.[^.]+$/,'');
  s.cardEl.querySelector('.card-filename').textContent = filename;
  const badge = s.cardEl.querySelector('.card-format-badge');
  if (badge) badge.textContent = ext.slice(1).toUpperCase();
  renderCardBody(cardId, entries, stem);
}

function renderZipChoice(cardId, models) {
  const s = sessions.get(cardId); if (!s) return;
  const body = s.cardEl.querySelector('.card-body');
  setCardProgress(cardId, 100);
  body.innerHTML = `
    <div class="card-status info">ZIP zawiera wiele plików 3D — wybierz który przetworzyć.</div>
    <div class="zip-choice-label">Pliki w archiwum:</div>
    ${models.map((m,i) => `<button class="zip-choice-btn" data-idx="${i}">${escHtml(m.name)} <span style="color:#475569;font-size:0.8rem">${escHtml(m.ext)}</span></button>`).join('')}`;
  body.querySelectorAll('.zip-choice-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const m = models[parseInt(btn.dataset.idx)];
      body.innerHTML = `<div class="card-status info">Wczytywanie ${escHtml(m.name)}…</div>`;
      await loadModelToCard(cardId, m.buffer, m.ext, m.name, m.fbmImages);
    });
  });
}

// ── Add new card for file (with duplicate check) ───────────────────────────
function addNewCardForFile(file) {
  for (const [,s] of sessions) {
    if (s.origFilename===file.name) { showToast(`"${file.name}" jest już załadowany`); return; }
  }
  const cardId = createCard(file.name);
  sessions.get(cardId).origFilename = file.name;
  processFileToCard(cardId, file);
}

// ── Suffix dropdown ────────────────────────────────────────────────────────
function buildSuffixMenu(menu, input) {
  menu.innerHTML='';
  PBR_GROUPS.forEach((group,gi) => {
    if (gi>0) { const sep=document.createElement('div'); sep.className='menu-sep'; menu.appendChild(sep); }
    const gl=document.createElement('div'); gl.className='suffix-menu-group-label'; gl.textContent=group.label; menu.appendChild(gl);
    group.items.forEach(val => {
      const btn=document.createElement('button'); btn.type='button'; btn.textContent=val;
      btn.addEventListener('mousedown', e => {
        e.preventDefault(); input.value=val;
        input.classList.toggle('modified',val!==input.dataset.orig);
        input.dispatchEvent(new Event('input',{bubbles:true})); menu.classList.remove('open');
      });
      menu.appendChild(btn);
    });
  });
}
document.addEventListener('click', e => {
  if (!e.target.closest('.suffix-wrap')) document.querySelectorAll('.suffix-menu.open').forEach(m=>m.classList.remove('open'));
});
document.addEventListener('click', e => {
  const btn = e.target.closest('.suffix-drop-btn'); if (!btn) return;
  e.stopPropagation();
  const wrap=btn.closest('.suffix-wrap');
  const menu=wrap.querySelector('.suffix-menu');
  const input=wrap.querySelector('.suffix-input');
  const isOpen=menu.classList.contains('open');
  document.querySelectorAll('.suffix-menu.open').forEach(m=>m.classList.remove('open'));
  if (!isOpen) { if (!menu.children.length) buildSuffixMenu(menu,input); menu.classList.add('open'); }
});

// ── Lightbox ───────────────────────────────────────────────────────────────
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxLabel = document.getElementById('lightbox-label');
document.addEventListener('click', e => {
  const thumb = e.target.closest('.thumb');
  if (thumb) { lightboxImg.src=thumb.src; lightboxLabel.textContent=thumb.dataset.name||''; lightbox.classList.add('open'); return; }
  if (e.target===lightbox||lightbox.contains(e.target)) { lightbox.classList.remove('open'); lightboxImg.src=''; }
});
document.addEventListener('keydown', e => { if (e.key==='Escape') { lightbox.classList.remove('open'); lightboxImg.src=''; } });

// ── Global buttons ─────────────────────────────────────────────────────────
document.getElementById('btn-export-all').addEventListener('click', async () => {
  if (!sessions.size) { showToast('Brak załadowanych plików'); return; }
  for (const [cardId] of sessions) await exportCard(cardId);
});
document.getElementById('btn-clear-all').addEventListener('click', () => {
  for (const [,s] of sessions) s.blobUrls.forEach(u=>URL.revokeObjectURL(u));
  sessions.clear();
  document.getElementById('sessions-container').innerHTML='';
});

// ── Drop zone ──────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const sessionsContainer = document.getElementById('sessions-container');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', e => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  Array.from(e.dataTransfer.files).forEach(addNewCardForFile);
});
fileInput.addEventListener('change', () => {
  Array.from(fileInput.files).forEach(addNewCardForFile);
  fileInput.value='';
});
</script>
